    <script>
      // SPA GitHub Pages redirect: 404.html stashes the requested path in
      // sessionStorage and sends the visitor to the base URL. Restore it here
      // BEFORE React mounts so react-router picks up the deep link.
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
